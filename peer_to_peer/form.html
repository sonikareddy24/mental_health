<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zappyy - Mental Health Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(to bottom, #000, #001a1a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            margin: 20px auto;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .logo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 15px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }
        
        .logo-circle img {
            width: 90%;
            height: 90%;
            object-fit: cover;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }
        
        .form-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 20px;
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h2 {
            color: #00ffff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .form-header p {
            color: #ffffff;
            font-size: 16px;
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-size: 18px;
        }
        
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="email"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .radio-group, .checkbox-group {
            margin-top: 10px;
        }
        
        .radio-option, .checkbox-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        
        .radio-option:hover, .checkbox-option:hover {
            background-color: rgba(0, 255, 255, 0.1);
        }
        
        .radio-option input, .checkbox-option input {
            margin-right: 10px;
            accent-color: #00ffff;
        }
        
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        .btn {
            background: linear-gradient(45deg, #006666, #00ffff);
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        
        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 30px 0 10px;
            height: 10px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #006666, #00ffff);
            border-radius: 20px;
            transition: width 0.5s ease;
        }
        
        .step-indicator {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .form-complete {
            text-align: center;
            display: none;
        }
        
        .form-complete.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .form-complete h3 {
            color: #00ffff;
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .form-complete p {
            margin-bottom: 20px;
        }
        
        .checkmark {
            display: block;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            text-align: center;
            line-height: 80px;
            font-size: 40px;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            .container {
                width: 95%;
            }
            
            .form-card {
                padding: 20px;
            }
            
            .form-header h2 {
                font-size: 24px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
        
        /* Increase checkbox and radio button size */
        input[type="checkbox"], input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
        
        /* Improve visibility of selected options */
        .radio-option.selected, .checkbox-option.selected {
            background-color: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
        }
        
        /* Style for dropdown */
        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300ffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.6%205.4-7.9%205.4-12.9%200-5-1.9-9.2-5.5-12.7z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 12px auto;
            cursor: pointer;
        }
        
        select:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-circle">
                <img src="C:\Users\aksha\OneDrive\Desktop\microsoft\microsoft\sonicrp\micro\robogad.jpg" alt="Zappyy Logo">
            </div>
            <div class="logo">ZAPPYY</div>
        </div>
        
        <div class="form-card">
            <div class="form-header">
                <h2>Mental Health Information</h2>
                <p>Help us understand you better so we can provide personalized support</p>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width: 16.66%"></div>
            </div>
            <div class="step-indicator" id="stepIndicator">Step 1 of 6</div>
            
            <form id="mentalHealthForm">
                <!-- Step 1: Basic Information -->
                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label for="age">1 How old are you?</label>
                        <input type="number" id="age" name="age" min="13" max="100" required>
                    </div>
                    
                    <div class="form-group">
                        <label>2 What is your current occupation?</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="student" name="occupation" value="student" required>
                                <label for="student">Student</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="working" name="occupation" value="working">
                                <label for="working">Working Professional</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="both" name="occupation" value="both">
                                <label for="both">Both Student and Working</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="other_occupation" name="occupation" value="other">
                                <label for="other_occupation">Other</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="btn-container">
                        <div></div> <!-- Empty div for spacing -->
                        <button type="button" class="btn" onclick="nextStep(1)">Next</button>
                    </div>
                </div>
                
                <!-- Step 2: Current Feelings -->
                <div class="form-step" id="step2">
                    <div class="form-group">
                        <label>3 How would you rate your stress level in the past week?</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="stress_1" name="stress_level" value="1" required>
                                <label for="stress_1">Very Low (Feeling calm and relaxed)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="stress_2" name="stress_level" value="2">
                                <label for="stress_2">Low (Occasionally feeling stressed)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="stress_3" name="stress_level" value="3">
                                <label for="stress_3">Moderate (Frequently feeling stressed)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="stress_4" name="stress_level" value="4">
                                <label for="stress_4">High (Often overwhelmed by stress)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="stress_5" name="stress_level" value="5">
                                <label for="stress_5">Very High (Constantly feeling stressed and overwhelmed)</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>4 What emotions have you been experiencing lately? (Select all that apply)</label>
                        <div class="checkbox-group">
                            <div class="checkbox-option">
                                <input type="checkbox" id="emotion_anxiety" name="emotions" value="anxiety">
                                <label for="emotion_anxiety">Anxiety</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="emotion_sadness" name="emotions" value="sadness">
                                <label for="emotion_sadness">Sadness</label>
                            </div>
<div class="checkbox-option">
                                <input type="checkbox" id="emotion_fear" name="emotions" value="fear">
                                <label for="emotion_fear">Fear</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="emotion_anger" name="emotions" value="anger">
                                <label for="emotion_anger">Anger</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="emotion_joy" name="emotions" value="joy">
                                <label for="emotion_joy">Joy</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="emotion_hopelessness" name="emotions" value="hopelessness">
                                <label for="emotion_hopelessness">Hopelessness</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="emotion_overwhelm" name="emotions" value="overwhelm">
                                <label for="emotion_overwhelm">Overwhelm</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="btn-container">
                        <button type="button" class="btn btn-back" onclick="prevStep(2)">Back</button>
                        <button type="button" class="btn" onclick="nextStep(2)">Next</button>
                    </div>
                </div>
                
                <!-- Step 3: Specific Challenges -->
                <div class="form-step" id="step3">
                    <div class="form-group">
                        <label>5 What are you currently struggling with? (Select all that apply)</label>
                        <div class="checkbox-group">
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_academic" name="challenges" value="academic">
                                <label for="challenge_academic">Academic pressure</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_relationship" name="challenges" value="relationship">
                                <label for="challenge_relationship">Relationship issues</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_financial" name="challenges" value="financial">
                                <label for="challenge_financial">Financial concerns</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_work" name="challenges" value="work">
                                <label for="challenge_work">Work-related stress</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_health" name="challenges" value="health">
                                <label for="challenge_health">Health issues</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_social" name="challenges" value="social">
                                <label for="challenge_social">Social anxiety</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_identity" name="challenges" value="identity">
                                <label for="challenge_identity">Identity or self-esteem</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="challenge_other" name="challenges" value="other">
                                <label for="challenge_other">Other</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>6 How long have you been experiencing these challenges?</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="duration_recent" name="challenge_duration" value="recent" required>
                                <label for="duration_recent">Recent (less than a month)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="duration_months" name="challenge_duration" value="months">
                                <label for="duration_months">Several months</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="duration_year" name="challenge_duration" value="year">
                                <label for="duration_year">About a year</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="duration_years" name="challenge_duration" value="years">
                                <label for="duration_years">Several years</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="btn-container">
                        <button type="button" class="btn btn-back" onclick="prevStep(3)">Back</button>
                        <button type="button" class="btn" onclick="nextStep(3)">Next</button>
                    </div>
                </div>
                
                <!-- Step 4: Support Systems -->
                <div class="form-step" id="step4">
                    <div class="form-group">
                        <label>7 Do you have anyone you can talk to about your mental health?</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="support_yes" name="support_system" value="yes" required>
                                <label for="support_yes">Yes, I have supportive people in my life</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="support_sometimes" name="support_system" value="sometimes">
                                <label for="support_sometimes">Sometimes, but not consistently</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="support_no" name="support_system" value="no">
                                <label for="support_no">No, I don't have anyone to talk to</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>8 Have you ever sought professional mental health support?</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="prof_help_current" name="professional_help" value="current" required>
                                <label for="prof_help_current">Yes, I'm currently receiving support</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="prof_help_past" name="professional_help" value="past">
                                <label for="prof_help_past">Yes, in the past but not currently</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="prof_help_no" name="professional_help" value="no">
                                <label for="prof_help_no">No, I've never sought professional support</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="btn-container">
                        <button type="button" class="btn btn-back" onclick="prevStep(4)">Back</button>
                        <button type="button" class="btn" onclick="nextStep(4)">Next</button>
                    </div>
                </div>
                
                <!-- Step 5: Coping Strategies -->
                <div class="form-step" id="step5">
                    <div class="form-group">
                        <label>9 What helps you cope when you're feeling down? (Select all that apply)</label>
                        <div class="checkbox-group">
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_exercise" name="coping" value="exercise">
                                <label for="cope_exercise">Physical exercise</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_creative" name="coping" value="creative">
                                <label for="cope_creative">Creative activities (art, music, writing)</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_meditation" name="coping" value="meditation">
                                <label for="cope_meditation">Meditation or mindfulness</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_friends" name="coping" value="friends">
                                <label for="cope_friends">Talking with friends or family</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_entertainment" name="coping" value="entertainment">
                                <label for="cope_entertainment">Entertainment (movies, games, etc.)</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_nature" name="coping" value="nature">
                                <label for="cope_nature">Spending time in nature</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="cope_nothing" name="coping" value="nothing">
                                <label for="cope_nothing">Nothing seems to help</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>10 On a scale of 1-5, how effective are your current coping strategies?</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="cope_effect_1" name="coping_effectiveness" value="1" required>
                                <label for="cope_effect_1">1 - Not effective at all</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="cope_effect_2" name="coping_effectiveness" value="2">
                                <label for="cope_effect_2">2 - Slightly effective</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="cope_effect_3" name="coping_effectiveness" value="3">
                                <label for="cope_effect_3">3 - Moderately effective</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="cope_effect_4" name="coping_effectiveness" value="4">
                                <label for="cope_effect_4">4 - Very effective</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="cope_effect_5" name="coping_effectiveness" value="5">
                                <label for="cope_effect_5">5 - Extremely effective</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="btn-container">
                        <button type="button" class="btn btn-back" onclick="prevStep(5)">Back</button>
                        <button type="button" class="btn" onclick="nextStep(5)">Next</button>
                    </div>
                </div>
                
                <!-- Step 6: Goals and Preferences -->
                <div class="form-step" id="step6">
                    <div class="form-group">
                        <label>11 What would you like to achieve through mental health support? (Select all that apply)</label>
                        <div class="checkbox-group">
                            <div class="checkbox-option">
                                <input type="checkbox" id="goal_understand" name="goals" value="understand">
                                <label for="goal_understand">Better understand my feelings</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="goal_cope" name="goals" value="cope">
                                <label for="goal_cope">Learn new coping strategies</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="goal_reduce" name="goals" value="reduce">
                                <label for="goal_reduce">Reduce anxiety or stress</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="goal_improve" name="goals" value="improve">
                                <label for="goal_improve">Improve relationships</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="goal_sleep" name="goals" value="sleep">
                                <label for="goal_sleep">Improve sleep</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="goal_confidence" name="goals" value="confidence">
                                <label for="goal_confidence">Build self-confidence</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="additional_info">Is there anything else you'd like to share about your mental health?</label>
                        <textarea id="additional_info" name="additional_info" placeholder="Type your thoughts here..."></textarea>
                    </div>
                    
                    <div class="btn-container">
                        <button type="button" class="btn btn-back" onclick="prevStep(6)">Back</button>
                        <button type="button" class="btn" onclick="submitForm()">Submit</button>
                    </div>
                </div>
            </form>
            
            <div class="form-complete" id="formComplete">
                <div class="checkmark">✓</div>
                <h3>Thank You!</h3>
                <p>Your information has been submitted successfully. We'll use this to provide you with personalized mental health support.</p>
                <button type="button" class="btn" onclick="window.location.href='index.html'">Go to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        // Replace number input with a dropdown for age
        window.onload = function() {
            const ageInput = document.getElementById('age');
            const ageParent = ageInput.parentNode;
            
            // Create select element
            const ageSelect = document.createElement('select');
            ageSelect.id = 'age';
            ageSelect.name = 'age';
            ageSelect.required = true;
            
            // Add default option
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = 'Select your age';
            defaultOption.selected = true;
            defaultOption.disabled = true;
            ageSelect.appendChild(defaultOption);
            
            // Add age options
            for (let i = 13; i <= 100; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                ageSelect.appendChild(option);
            }
            
            // Replace input with select
            ageParent.replaceChild(ageSelect, ageInput);
            
            // Add event listeners for radio and checkbox options
            const radioOptions = document.querySelectorAll('.radio-option');
            radioOptions.forEach(option => {
                option.addEventListener('click', function() {
                    // Find the radio input within this option
                    const radioInput = this.querySelector('input[type="radio"]');
                    if (radioInput) {
                        radioInput.checked = true;
                        
                        // Remove selected class from all options in the same group
                        const name = radioInput.getAttribute('name');
                        document.querySelectorAll(`input[name="${name}"]`).forEach(input => {
                            input.closest('.radio-option').classList.remove
input.closest('.radio-option').classList.remove('selected');
                        });
                        
                        // Add selected class to this option
                        this.classList.add('selected');
                    }
                });
            });
            
            const checkboxOptions = document.querySelectorAll('.checkbox-option');
            checkboxOptions.forEach(option => {
                option.addEventListener('click', function(e) {
                    // Don't trigger if clicking on the checkbox itself
                    if (e.target.type !== 'checkbox') {
                        const checkboxInput = this.querySelector('input[type="checkbox"]');
                        checkboxInput.checked = !checkboxInput.checked;
                    }
                    
                    // Toggle selected class
                    this.classList.toggle('selected', this.querySelector('input[type="checkbox"]').checked);
                });
            });
        };
        
        // Form navigation functions
        let currentStep = 1;
        const totalSteps = 6;
        
        function updateProgress() {
            const progressPercent = (currentStep / totalSteps) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';
            document.getElementById('stepIndicator').textContent = `Step ${currentStep} of ${totalSteps}`;
        }
        
        function nextStep(step) {
            // Basic validation for current step
            if (!validateStep(step)) {
                return;
            }
            
            document.getElementById(`step${step}`).classList.remove('active');
            currentStep = step + 1;
            document.getElementById(`step${currentStep}`).classList.add('active');
            updateProgress();
            
            // Scroll to top of form
            document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
        }
        
        function prevStep(step) {
            document.getElementById(`step${step}`).classList.remove('active');
            currentStep = step - 1;
            document.getElementById(`step${currentStep}`).classList.add('active');
            updateProgress();
            
            // Scroll to top of form
            document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
        }
        
        function validateStep(step) {
            let isValid = true;
            
            // Step-specific validation
            if (step === 1) {
                const age = document.getElementById('age').value;
                const occupation = document.querySelector('input[name="occupation"]:checked');
                
                if (!age) {
                    alert('Please select your age.');
                    isValid = false;
                } else if (!occupation) {
                    alert('Please select your occupation.');
                    isValid = false;
                }
            } 
            else if (step === 2) {
                const stressLevel = document.querySelector('input[name="stress_level"]:checked');
                
                if (!stressLevel) {
                    alert('Please rate your stress level.');
                    isValid = false;
                }
            } 
            else if (step === 3) {
                const challengeDuration = document.querySelector('input[name="challenge_duration"]:checked');
                
                if (!challengeDuration) {
                    alert('Please select how long you have been experiencing these challenges.');
                    isValid = false;
                }
            } 
            else if (step === 4) {
                const supportSystem = document.querySelector('input[name="support_system"]:checked');
                const professionalHelp = document.querySelector('input[name="professional_help"]:checked');
                
                if (!supportSystem) {
                    alert('Please indicate if you have a support system.');
                    isValid = false;
                } else if (!professionalHelp) {
                    alert('Please indicate if you have sought professional help.');
                    isValid = false;
                }
            }
            else if (step === 5) {
                const copingEffectiveness = document.querySelector('input[name="coping_effectiveness"]:checked');
                
                if (!copingEffectiveness) {
                    alert('Please rate the effectiveness of your coping strategies.');
                    isValid = false;
                }
            }
            
            return isValid;
        }
        
        function submitForm() {
            // Validate final step
            if (!validateStep(6)) {
                return;
            }
            
            // Hide the form and show completion message
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById('formComplete').classList.add('active');
            document.getElementById('progressBar').style.width = '100%';
            
            // Form data collection
            const formData = new FormData(document.getElementById('mentalHealthForm'));
            const formDataObj = {};
            
            // Convert FormData to regular object
            for (let [key, value] of formData.entries()) {
                if (formDataObj[key]) {
                    // If key already exists, make it an array
                    if (!Array.isArray(formDataObj[key])) {
                        formDataObj[key] = [formDataObj[key]];
                    }
                    formDataObj[key].push(value);
                } else {
                    formDataObj[key] = value;
                }
            }
            
            // Here you would typically send the data to your server
            console.log('Form data:', formDataObj);
            
            // For demo purposes, we'll just simulate a submission
            // In a real application, you would use fetch() or axios to post this data
            /*
            fetch('your-api-endpoint', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formDataObj)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
            })
            .catch(error => {
                console.error('Error:', error);
            });
            */
        }
        
        // Event listeners for checkboxes to handle parent div selection
        document.addEventListener('DOMContentLoaded', function() {
            // Add label click handling for radio and checkboxes
            const labels = document.querySelectorAll('.radio-option label, .checkbox-option label');
            labels.forEach(label => {
                label.addEventListener('click', function(e) {
                    // Prevent the default label behavior
                    e.preventDefault();
                    
                    // Find the associated input
                    const inputId = this.getAttribute('for');
                    const input = document.getElementById(inputId);
                    
                    // Toggle the input
                    if (input.type === 'checkbox') {
                        input.checked = !input.checked;
                        input.closest('.checkbox-option').classList.toggle('selected', input.checked);
                    } else if (input.type === 'radio') {
                        input.checked = true;
                        
                        // Update selected class
                        const name = input.getAttribute('name');
                        document.querySelectorAll(`input[name="${name}"]`).forEach(radioInput => {
                            radioInput.closest('.radio-option').classList.remove('selected');
                        });
                        input.closest('.radio-option').classList.add('selected');
                    }
                });
            });
        });
    </script>
